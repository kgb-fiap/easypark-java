# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - api-easypark

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'maven'
          cache-dependency-path: 'easypark/pom.xml'

      - name: Build with Maven
        working-directory: ./easypark
        shell: pwsh
        run: |
          $attempts = 3

          for ($i = 1; $i -le $attempts; $i++) {
            mvn -B -U -DskipTests clean package
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($i -lt $attempts) {
              Start-Sleep -Seconds (20 * $i)
            }
          }

          exit $LASTEXITCODE

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/easypark/target/*.jar'

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_928DEC28040C4910A365F16507A45E57 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_46A99757CDE743389221DB0F32B24767 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5ADC7B0B0CE645A8838E0B682C2C7B45 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-easypark'
          slot-name: 'Production'
          package: '*.jar'
