spring.application.name=easypark

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Limita o scan ao pacote dos controllers.
springdoc.packages-to-scan=br.com.fiap.easypark.controller
springdoc.paths-to-exclude=/error/**,/web/**

# Hikari pool.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.minimum-idle=2

spring.datasource.url=${DB_EASYPARK_URL}
spring.datasource.username=${DB_EASYPARK_USER}
spring.datasource.password=${DB_EASYPARK_PASS}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Existing Sprint 2 Oracle schemas are baselined at version 3; clean schemas still run V1..V3.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3
spring.flyway.locations=classpath:db/migration

# Firebase Auth integration for the future React frontend.
# Keep disabled when no service account/application default credentials are available.
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}
firebase.default-role=${FIREBASE_DEFAULT_ROLE:MOTORISTA}
firebase.allowed-origins=${FIREBASE_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
