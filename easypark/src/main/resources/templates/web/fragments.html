<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header(active)" class="topbar">
    <a class="brand" th:href="@{/web}">EasyPark</a>
    <nav aria-label="Navegacao principal">
        <a th:href="@{/web}" th:classappend="${active == 'dashboard'} ? ' active' : ''">Inicio</a>
        <a th:href="@{/web/estacionamentos}" th:classappend="${active == 'estacionamentos'} ? ' active' : ''">Estacionamentos</a>
        <a th:href="@{/web/minhas-reservas}" th:classappend="${active == 'reservas'} ? ' active' : ''">Reservas</a>
        <a sec:authorize="hasAnyRole('OPERADOR','ADMIN')" th:href="@{/web/operador}" th:classappend="${active == 'operador'} ? ' active' : ''">Operador</a>
    </nav>
    <form th:action="@{/web/logout}" method="post" class="logout-form">
        <span th:text="${displayName}">usuario</span>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">Sair</button>
    </form>
</header>

<footer th:fragment="footer" class="footer">
    <span>EasyPark</span>
</footer>
</body>
</html>
